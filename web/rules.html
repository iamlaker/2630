<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>规则集维护</title><link rel="stylesheet" href="/rules.css"></head><body><div id="login" class="login"><form id="loginForm"><h1>管理员登录</h1><p>输入启动工作台时显示的管理员令牌。</p><input id="adminToken" type="password" placeholder="管理员令牌" required><button>进入规则维护</button><div id="loginError"></div></form></div><div id="app" hidden><header><div><small>管理员模块 / RULE CONTROL</small><h1>规则集确认与维护</h1></div><div><select id="templateSelect"></select><button id="rescan">受控重新扫描</button><button class="standalone-only" onclick="location.href='/'">返回测算台</button></div></header><section class="summary"><div id="counts"></div><button id="activation"></button></section><main><aside><div class="filters"><input id="search" placeholder="搜索指标"><select id="status"><option value="">全部状态</option><option value="pending_confirmation">待确认</option><option value="changed">变化</option><option value="confirmed">已确认</option><option value="rejected">拒绝</option><option value="unsupported">不支持</option></select><select id="ruleGroup"><option value="">全部分组</option></select><select id="confidence"><option value="">全部置信度</option><option value="high">高置信度</option><option value="low">低置信度</option></select><select id="diagnostic"><option value="">全部诊断</option><option value="processed_formula">加工公式</option><option value="read_error">读取失败</option><option value="cycle_detected">循环</option><option value="unparseable">无法解析</option><option value="max_depth_reached">超深链</option></select><select id="configuration"><option value="">全部配置</option><option value="incomplete">配置未完成</option><option value="complete">配置完整</option></select></div><div id="rules"></div></aside><article id="detail"><div class="empty">选择一条规则开始审查</div></article></main></div><div id="toast"></div><script src="/rules.js"></script></body></html>
